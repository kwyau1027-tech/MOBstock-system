<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貨號名稱架位庫存查詢</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微軟正黑體",sans-serif;}
body{background:#f5f7fa;padding:20px;max-width:1250px;margin:0 auto;}
.wrap{background:#fff;padding:28px;border-radius:12px;box-shadow:0 2px 14px #e2e8f0;}
h2{text-align:center;margin-bottom:20px;color:#2d3748;}
.search-area{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
#keyword{flex:1;min-width:280px;padding:12px 15px;border:1px solid #cbd5e0;border-radius:6px;font-size:16px;}
button{padding:12px 20px;border:none;border-radius:6px;cursor:pointer;font-size:15px;}
#searchBtn{background:#2b6cb0;color:#fff;}
#resetBtn{background:#718096;color:#fff;}
.total-box{background:#f0f4fa;padding:15px;border-radius:6px;margin-bottom:18px;font-size:16px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #e2e8f0;padding:14px;text-align:center;}
th{background:#edf2f7;}
tr:hover{background:#f7fafc;}
.tip{font-size:14px;color:#666;margin-bottom:12px;}
</style>
</head>
<body>
<div class="wrap">
    <h2>貨號｜品名｜架位｜庫存查詢系統</h2>
    <div class="tip">可輸入貨號/品名關鍵字，列出所有對應架位與數量，自動合計總庫存</div>
    <div class="search-area">
        <input id="keyword" placeholder="輸入貨號或名稱搜尋">
        <button id="searchBtn">查詢</button>
        <button id="resetBtn">清空</button>
    </div>
    <div id="totalBox" class="total-box" style="display:none;"></div>
    <table>
        <thead>
            <tr>
                <th>貨號</th>
                <th>名稱</th>
                <th>存放架位</th>
                <th>庫存數量</th>
            </tr>
        </thead>
        <tbody id="resultTable"></tbody>
    </table>
</div>

<script>
let stockList = [];

fetch("./stock.csv")
.then(res => res.text())
.then(text => {
    parseCSV(text);
})
.catch(() => {
    document.getElementById("resultTable").innerHTML = `<tr><td colspan="4">無法讀取 stock.csv</td></tr>`;
})

function parseCSV(txt){
    const rows = txt.trim().split("\n");
    stockList = [];
    // 跳過第1行表頭，從第2行開始讀取
    for(let i=1; i<rows.length; i++){
        let arr = rows[i].split(",");
        if(arr.length >= 4){
            stockList.push({
                pid: arr[0].trim(),    // A欄 貨號
                name: arr[1].trim(),   // B欄 名稱
                shelf: arr[2].trim(),  // C欄 架位
                qty: arr[3].trim()     // D欄 庫存
            })
        }
    }
}

document.getElementById("searchBtn").onclick = function(){
    let key = document.getElementById("keyword").value.trim().toLowerCase();
    let tbody = document.getElementById("resultTable");
    let totalBox = document.getElementById("totalBox");
    tbody.innerHTML = "";
    totalBox.style.display = "none";

    if(!key){
        tbody.innerHTML = `<tr><td colspan="4">請輸入查詢關鍵字</td></tr>`;
        return;
    }

    // 支援 貨號 或 名稱 模糊搜尋
    let list = stockList.filter(item=>{
        return item.pid.toLowerCase().includes(key) || item.name.toLowerCase().includes(key);
    })

    if(list.length === 0){
        tbody.innerHTML = `<tr><td colspan="4">無匹配資料</td></tr>`;
        return;
    }

    // 計算該查詢結果總庫存
    let sum = list.reduce((acc, cur)=>{
        return acc + (Number(cur.qty) || 0);
    }, 0);

    totalBox.innerHTML = `查詢結果共 ${list.length} 筆｜該項合計總庫存：<strong>${sum}</strong>`;
    totalBox.style.display = "block";

    list.forEach(row=>{
        tbody.innerHTML += `
        <tr>
            <td>${row.pid}</td>
            <td>${row.name}</td>
            <td>${row.shelf}</td>
            <td>${row.qty}</td>
        </tr>
        `
    })
}

// 回車快捷查詢
document.getElementById("keyword").addEventListener("keydown",e=>{
    if(e.key === "Enter") document.getElementById("searchBtn").click();
})

// 重置清空
document.getElementById("resetBtn").onclick = ()=>{
    document.getElementById("keyword").value = "";
    document.getElementById("resultTable").innerHTML = "";
    document.getElementById("totalBox").style.display = "none";
}
</script>
</body>
</html>
