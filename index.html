<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多架位庫存查詢系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微軟正黑體",sans-serif;}
body{background:#f5f7fa;padding:20px;max-width:1100px;margin:0 auto;}
.wrap{background:#fff;padding:26px;border-radius:12px;box-shadow:0 2px 14px #e2e8f0;}
h2{text-align:center;margin-bottom:20px;color:#2d3748;}
.search-area{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
#keyword{flex:1;min-width:260px;padding:11px 15px;border:1px solid #cbd5e0;border-radius:6px;font-size:16px;}
button{padding:11px 18px;border:none;border-radius:6px;cursor:pointer;font-size:15px;}
#searchBtn{background:#2b6cb0;color:#fff;}
#resetBtn{background:#718096;color:#fff;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #e2e8f0;padding:13px;text-align:center;}
th{background:#edf2f7;}
tr:hover{background:#f7fafc;}
.tip{font-size:14px;color:#666;margin-bottom:12px;}
</style>
</head>
<body>
<div class="wrap">
    <h2>多位置庫存查詢</h2>
    <div class="tip">輸入架位關鍵字，可一次列出所有匹配庫存位置與數量</div>
    <div class="search-area">
        <input id="keyword" placeholder="例：輸入A 會列出所有A開頭架位">
        <button id="searchBtn">查詢</button>
        <button id="resetBtn">清空結果</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>庫存架位</th>
                <th>庫存數量</th>
            </tr>
        </thead>
        <tbody id="resultTable"></tbody>
    </table>
</div>

<script>
let stockList = [];

// 載入同目錄 stock.csv
fetch("./stock.csv")
.then(res => res.text())
.then(text => {
    parseCSV(text);
})
.catch(() => {
    document.getElementById("resultTable").innerHTML = `<tr><td colspan="2">無法載入stock.csv檔案</td></tr>`;
})

// 解析CSV資料
function parseCSV(txt){
    const rows = txt.trim().split("\n");
    stockList = [];
    // 跳過第一行表頭
    for(let i=1; i<rows.length; i++){
        let arr = rows[i].split(",");
        if(arr.length >= 2){
            stockList.push({
                position: arr[0].trim(),
                qty: arr[1].trim()
            })
        }
    }
}

// 查詢核心：列出所有符合項目
document.getElementById("searchBtn").onclick = function(){
    let key = document.getElementById("keyword").value.trim().toLowerCase();
    let tbody = document.getElementById("resultTable");
    tbody.innerHTML = "";

    if(!key){
        tbody.innerHTML = `<tr><td colspan="2">請輸入查詢內容</td></tr>`;
        return;
    }

    // 過濾所有包含關鍵字的資料
    let matchAll = stockList.filter(item=>{
        return item.position.toLowerCase().includes(key) || item.qty.includes(key);
    })

    if(matchAll.length === 0){
        tbody.innerHTML = `<tr><td colspan="2">無任何匹配庫存資料</td></tr>`;
        return;
    }

    // 迴圈輸出全部多筆結果
    matchAll.forEach(item=>{
        tbody.innerHTML += `
        <tr>
            <td>${item.position}</td>
            <td>${item.qty}</td>
        </tr>
        `
    })
}

// 回車快捷查詢
document.getElementById("keyword").addEventListener("keydown",e=>{
    if(e.key === "Enter") document.getElementById("searchBtn").click();
})

// 清空
document.getElementById("resetBtn").onclick = function(){
    document.getElementById("keyword").value = "";
    document.getElementById("resultTable").innerHTML = "";
}
</script>
</body>
</html>
