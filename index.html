<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>庫存查詢系統</title>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif;
}
body{
  background-color: #f0f4f9;
  padding: 16px;
}
.container{
  background: #ffffff;
  border-radius: 16px;
  padding: 24px;
  max-width: 900px;
  margin: 0 auto;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
h1{
  text-align: center;
  font-size: 22px;
  color: #223354;
  margin-bottom: 16px;
}
.desc{
  text-align: center;
  color: #666;
  font-size: 14px;
  margin-bottom: 20px;
}
.search-bar{
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
#keyword{
  flex: 1;
  min-width: 180px;
  padding: 14px 16px;
  border: 1px solid #ccd6e0;
  border-radius: 8px;
  font-size: 16px;
}
.btn{
  padding: 14px 20px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  white-space: nowrap;
}
#searchBtn{
  background-color: #2b6cb0;
  color: white;
}
#resetBtn{
  background-color: #718096;
  color: white;
}
.total-info{
  background: #eef5ff;
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  color: #223354;
}
table{
  width: 100%;
  border-collapse: collapse;
}
th, td{
  border: 1px solid #e2e8f0;
  padding: 16px 12px;
  text-align: center;
  vertical-align: middle;
}
th{
  background-color: #eef2f9;
  color: #223354;
  font-weight: 600;
}
td{
  color: #333;
}
tr:nth-child(even){
  background-color: #f9fbfd;
}
tr:hover{
  background-color: #eef5ff;
}
/* 長品名自動換行 */
td:nth-child(2){
  text-align: left;
  word-break: break-word;
  white-space: normal;
}
</style>
</head>
<body>
<div class="container">
    <h1>多位置庫存查詢</h1>
    <div class="desc">輸入貨號關鍵字，可一次列出所有匹配庫存位置與數量</div>

    <div class="search-bar">
        <input id="keyword" placeholder="輸入貨號查詢">
        <button id="searchBtn" class="btn">查詢</button>
        <button id="resetBtn" class="btn">清空結果</button>
    </div>

    <div id="totalBox" class="total-info" style="display:none;"></div>

    <table>
        <thead>
            <tr>
                <th>貨號</th>
                <th>名稱</th>
                <th>存放架位</th>
                <th>庫存數量</th>
            </tr>
        </thead>
        <tbody id="resultTable"></tbody>
    </table>
</div>

<script>
let stockList = [];

fetch("./stock.csv")
.then(res => res.text())
.then(text => {
    parseCSV(text);
})
.catch(() => {
    document.getElementById("resultTable").innerHTML = `<tr><td colspan="4">無法讀取 stock.csv，請確認檔案存在</td></tr>`;
})

function parseCSV(txt){
    const rows = txt.trim().split("\n");
    stockList = [];
    for(let i=1; i<rows.length; i++){
        let arr = rows[i].split(",");
        if(arr.length >= 4){
            stockList.push({
                pid: arr[0].trim(),
                name: arr[1].trim(),
                shelf: arr[2].trim(),
                qty: arr[3].trim()
            })
        }
    }
}

document.getElementById("searchBtn").onclick = function(){
    let key = document.getElementById("keyword").value.trim().toLowerCase();
    let tbody = document.getElementById("resultTable");
    let totalBox = document.getElementById("totalBox");
    tbody.innerHTML = "";
    totalBox.style.display = "none";

    if(!key){
        tbody.innerHTML = `<tr><td colspan="4">請輸入查詢關鍵字</td></tr>`;
        return;
    }

    let list = stockList.filter(item=>{
        return item.pid.toLowerCase().includes(key) || item.name.toLowerCase().includes(key);
    })

    if(list.length === 0){
        tbody.innerHTML = `<tr><td colspan="4">無匹配資料</td></tr>`;
        return;
    }

    let sum = list.reduce((acc, cur)=>{
        return acc + (Number(cur.qty) || 0);
    }, 0);
    totalBox.innerHTML = `查詢結果共 ${list.length} 筆｜合計總庫存：${sum}`;
    totalBox.style.display = "block";

    list.forEach(row=>{
        tbody.innerHTML += `
        <tr>
            <td>${row.pid}</td>
            <td>${row.name}</td>
            <td>${row.shelf}</td>
            <td>${row.qty}</td>
        </tr>
        `
    })
}

// Enter快捷查詢
document.getElementById("keyword").addEventListener("keydown", e=>{
    if(e.key === "Enter") document.getElementById("searchBtn").click();
})

// 重置
document.getElementById("resetBtn").onclick = ()=>{
    document.getElementById("keyword").value = "";
    document.getElementById("resultTable").innerHTML = "";
    document.getElementById("totalBox").style.display = "none";
}
</script>
</body>
</html>
